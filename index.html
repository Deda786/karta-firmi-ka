<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <!-- Textová část -->
    <div class="text">
        <h1>Get <span>insights</span> that help your business grow.</h1>

        <p>
            Discover the benefits of data analytics and make better decisions
            regarding revenue, customer experience, and overall efficiency.
        </p>

        <!-- Statistiky -->
        <div class="stats">
            <div>
                <h2>10k+</h2>
                <p>Companies</p>
            </div>

            <div>
                <h2>314</h2>
                <p>Templates</p>
            </div>

            <div>
                <h2>12M+</h2>
                <p>Queries</p>
            </div>
        </div>
    </div>

    <!-- Obrázek -->
    <div class="image">
        <img src="images/image-header-desktop.jpg" alt="Business image">
    </div>

</div>

</body>
</html>
